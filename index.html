<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brot! - Stories from AT Protocol</title>
  <!-- Start Single Page Apps for GitHub Pages -->
  <script type="text/javascript">
    (function(l) {
      if (l.search[1] === '/' ) {
        var decoded = l.search.slice(1).split('&').map(function(s) { 
          return s.replace(/~and~/g, '&')
        }).join('?');
        window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location))
  </script>
  <!-- End Single Page Apps for GitHub Pages -->
  <meta name="description" content="ATProto hosted blog - share posts and connect over a decentralized social network.">
  <!-- Open Graph / Facebook -->
  <meta property="og:title" content="Brot! An ATProto Hosted Blog">
  <meta property="og:description" content="A decentralized blog running on ATProto – post, explore, and share your thoughts with others.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="public/blogat.png">
  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Brot! An ATProto Hosted Blog">
  <meta name="twitter:description" content="A decentralized blog running on ATProto – post, explore, and share your thoughts with others.">
  <meta name="twitter:image" content="public/blogat.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

</head>
